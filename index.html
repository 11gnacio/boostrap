<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Eco de los Siglos</title>

    <!-- Bootstrap CSS: siempre primero -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts: antes de nuestro CSS -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <link rel="icon" href="data:," />
<script src="https://cdn.jsdelivr.net/npm/gifler@0.1.0/gifler.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const canvas = document.createElement("canvas");
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext("2d");

    const link = document.querySelector("link[rel~='icon']");

    gifler("static/images/favicon.gif").frames(canvas, function (ctx, frame) {
      ctx.clearRect(0, 0, 32, 32);
      ctx.drawImage(frame.buffer, 0, 0, 32, 32);
      link.href = canvas.toDataURL("image/png");
    });
  });
</script>


    <!-- Nuestro CSS: siempre al final -->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>

    <!-- ============================================
       HERO: sección de bienvenida a pantalla completa
  ============================================= -->
    <section class="hero-wrap position-relative overflow-hidden">

        <!-- Capa 1: estrellas -->
        <div class="stars position-absolute top-0 start-0 w-100 h-100"></div>

        <!-- Capa 2: nebulosa -->
        <div class="nebula position-absolute top-0 start-0 w-100 h-100"></div>

        <!-- Capa 3: halo del globo -->
        <div class="globe-glow position-absolute top-50 start-50 translate-middle"></div>

        <!-- Capa 4: globo terráqueo -->
        <div class="globe-container position-absolute top-50 start-50 translate-middle">
            <img class="globe-img w-100 h-100" src="static/images/tierra.png" alt="Globo terráqueo girando">
        </div>

        <!-- Aro sutil alrededor del globo -->
        <div class="globe-rim position-absolute top-50 start-50 translate-middle"></div>

        <!-- Capa 5: navbar -->
        <nav class="navbar navbar-eco position-absolute top-0 start-0 w-100">

            <div class="container-fluid d-flex align-items-center justify-content-between px-4">
                <!-- Logo -->
                <a class="navbar-brand d-flex align-items-center gap-2 brand-text" href="#">
                    <img src="static/images/logo_boostrap.jpg" class="brand-dot rounded-circle" alt="logo">
                    <!-- imagen circular -->
                    El Eco de los Siglos
                </a>

                <!-- Buscador -->
                <div class="search-wrapper d-none d-md-block">
                    <div class="search-icon-css"></div>
                    <input type="text" class="form-control border-0" placeholder="Buscar en los siglos..."
                        id="inputBusqueda">
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2">
                    <button class="btn btn-eco btn-ghost">Login</button>
                    <button class="btn btn-eco btn-solid">Registrarse</button>
                </div>

            </div>
        </nav>

        <!-- Capa 6: texto sobre el globo -->
        <div
            class="content-overlay position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center text-center">

            <div class="content-inner">

                <p class="eyebrow">Enciclopedia de la historia universal</p>

                <h1 class="hero-title">
                    El Eco de<br>los Siglos
                </h1>

                <div class="divider-line mx-auto mb-4"></div>

                <p class="hero-subtitle">Bienvenido a la Gran Línea Temporal</p>

                <div class="d-flex gap-3 justify-content-center mt-2">
                    <a href="#articulos" class="btn btn-eco btn-ghost">Explorar artículos</a>
                    <a href="#timeline" class="btn btn-eco btn-solid">Línea temporal</a>
                </div>

            </div>
        </div>

        <!-- Capa 7: puntos de scroll -->
        <div
            class="scroll-hint position-absolute bottom-0 start-50 translate-middle-x d-flex flex-column align-items-center pb-3">
            <div class="scroll-dot"></div>
            <div class="scroll-dot"></div>
            <div class="scroll-dot"></div>
        </div>

    </section>


    <!-- ============================================
       SECCIÓN DE ARTÍCULOS
       JS carga los artículos desde la API
       y los muestra como cards de Bootstrap.
  ============================================= -->
    <section class="articles-section py-5" id="articulos">

        <!-- limita y centra el contenido -->
        <div class="container">


            <!-- Título de sección -->
            <div class="row mb-5">
                <!-- entra el texto -->
                <div class="col text-center">
                    <h2 class="section-title">Artículos recientes</h2>
                    <div class="divider-line mx-auto mt-3"></div>
                </div>
            </div>

            <!-- Grid de artículos: JS llenará este div -->
            <div class="row g-4" id="articlesGrid">
                <!-- JS insertará columnas con cards aquí -->
            </div>

        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/script.js"></script>



</body>

</html>
